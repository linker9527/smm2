<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马里奥制造2 关卡/玩家查询 | 语言选择</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#ff4038,#ffc300);
    gap:16px;
}
h1{
    color:#fff;
    font-size:28px;
    text-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.sub-title{
    color:#fff;
    font-size:16px;
    opacity:0.9;
    margin-bottom:16px;
}
.btn-group{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    justify-content:center;
}
.lang-btn{
    padding:14px 36px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s ease;
}
.btn-cn{
    background:#ffffff;
    color:#dc2626;
}
.btn-en{
    background:#222222;
    color:#ffffff;
}
.lang-btn:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>
    <h1>马里奥制造2 关卡/玩家查询工具</h1>
    <div class="sub-title">Super Mario Maker 2 Level & Player Query Tool</div>
    <div class="btn-group">
        <button class="lang-btn btn-cn" onclick="location.href='zh_cn/'">中文简体</button>
        <button class="lang-btn btn-en" onclick="location.href='en/'">English</button>
    </div>
</body>
</html>
