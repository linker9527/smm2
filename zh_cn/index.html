<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马造2关卡/玩家查询</title>
<style>
*{font-family:system-ui, -apple-system, Helvetica Rounded, sans-serif;box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(140deg,#ff3c38,#ffc107);min-height:100vh;padding:24px 16px;display:flex;justify-content:center;}
.card{backdrop-filter:blur(10px);background:rgba(255,255,255,0.94);border-radius:24px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:100%;max-width:640px;padding:20px 24px;}
h1{font-size:24px;font-weight:bold;color:#dc2626;text-align:center;margin-bottom:8px;}
.sub-desc{text-align:center;color:#666;font-size:14px;margin-bottom:16px;}
.status-box{margin-bottom:16px;padding:12px 16px;border-radius:12px;background:#fef3c7;color:#92400e;text-align:center;font-size:14px;}
.status-green{background:#dcfce7;color:#166534;}
.status-orange{background:#ffedd5;color:#9a3412;}
.status-red{background:#fee2e2;color:#b91c1c;}
.details-wrap{margin-bottom:20px;background:#f3f4f6;border-radius:12px;padding:12px;}
details summary{font-weight:500;color:#444;cursor:pointer;}
textarea{width:100%;margin-top:12px;padding:10px;border:1px solid #ddd;border-radius:8px;resize:none;min-height:80px;}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.btn-red{background:#ef4444;color:white;border:none;padding:8px 12px;border-radius:8px;font-size:14px;cursor:pointer;}
.btn-red:hover{background:#dc2626;}
.btn-amber{background:#f59e0b;color:white;border:none;padding:8px 12px;border-radius:8px;font-size:14px;cursor:pointer;}
.btn-amber:hover{background:#d97706;}
.btn-blue{background:#3b82f6;color:white;border:none;padding:8px 12px;border-radius:8px;font-size:14px;cursor:pointer;}
.btn-blue:hover{background:#2563eb;}
.btn-gray{background:#e5e7eb;color:#333;border:none;padding:8px 12px;border-radius:8px;font-size:14px;cursor:pointer;}
.btn-gray:hover{background:#d1d5db;}
.block-title{font-weight:500;color:#333;margin-bottom:8px;font-size:16px;}
.gray-box{background:#f3f4f6;border-radius:12px;padding:16px;min-height:70px;margin-bottom:20px;}
.empty-text{color:#999;font-size:14px;}
.id-item{background:white;border:1px solid #ddd;border-radius:8px;padding:10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.id-tag{font-family:"Consolas",monospace;letter-spacing:1px;font-weight:bold;color:#dc2626;}
.info-card{border-left:4px solid #ef4444;background:#f3f4f6;border-radius:0 12px 12px 0;padding:16px;line-height:1.7;max-height:60vh;overflow-y:auto;}
.api-hidden{display:none;}
.history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.clear-his{font-size:12px;color:#dc2626;border:none;background:transparent;cursor:pointer;}
.history-item{background:white;border-radius:8px;padding:10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.his-text{font-family:"Consolas",monospace;color:#444;cursor:pointer;}
.flash-ok{animation:flashGreen 0.6s ease;}
@keyframes flashGreen{0%{background:#bbf7d0}100%{background:transparent}}
.link-text{color:#2563eb;text-decoration:none;}
.link-text:hover{text-decoration:underline;}
.user-input-row{display:flex;gap:8px;align-items:center;margin-top:12px;}
#userInfoWrap{margin-bottom:20px;display:none;}
input{flex:1;border:1px solid #ddd;border-radius:8px;padding:8px 12px;outline:none;}
input:focus{border-color:#f59e0b;}
.list-item{margin:4px 0;padding:4px;border-bottom:1px #ddd dashed;}
hr{border:none;border-top:1px #ccc solid;margin:12px 0;}
</style>
</head>
<body>
<div class="card">
<h1>马造2关卡/玩家查询</h1>
<p class="sub-desc">ID自动大写，一键查询全部数据</p>

<div id="statusBox" class="status-box">
输入ID后点击查询或回车
</div>

<div class="details-wrap">
<details open>
<summary>玩家查询</summary>
<div class="user-input-row">
<input id="makerInput" type="text" placeholder="输入玩家ID">
<button onclick="searchUser()" class="btn-blue">查询玩家</button>
<button onclick="clearUserInput()" class="btn-gray">清空</button>
</details>
</div>

<div id="userInfoWrap">
<p class="block-title">👤 玩家完整信息</p>
<div id="userInfoBox" class="info-card"></div>
</div>

<div class="details-wrap">
<details open>
<summary>关卡输入 / 剪贴板粘贴</summary>
<textarea id="textSource" rows="3" placeholder="粘贴完整关卡ID XXX-XXX-XXX"></textarea>
<div class="btn-row">
<button onclick="scanAllText()" class="btn-amber">执行查询</button>
<button onclick="pasteClipboard()" class="btn-blue">粘贴剪贴板</button>
<button onclick="clearTextarea()" class="btn-gray">清空</button>
</details>
</div>

<div>
<p class="block-title">待查询ID</p>
<div id="resultBox" class="gray-box">
<p class="empty-text">暂无识别ID</p>
</div>
</div>

<div id="apiInfoWrap" class="api-hidden">
<p class="block-title">📊 关卡详情</p>
<div id="apiInfoBox" class="info-card"></div>
</div>

<div style="margin-top:20px;">
<div class="history-head">
<p class="block-title">查询历史</p>
<button onclick="clearAllHistory()" class="clear-his">清空全部</button>
</div>
<div id="historyBox" class="gray-box">
<p class="empty-text">暂无记录</p>
</div>
</div>
</div>

<script>
const API_BASE = "https://tgrcode.com/mm2";
const USER_INFO = API_BASE + "/user_info";
const GET_POSTED = API_BASE + "/get_posted";
const GET_LIKED = API_BASE + "/get_liked";
const GET_PLAYED = API_BASE + "/get_played";
const GET_FIRST_CLEARED = API_BASE + "/get_first_cleared";
const GET_WORLD_RECORD = API_BASE + "/get_world_record";
const LEVEL_INFO = API_BASE + "/level_info";
const THUMB_URL = API_BASE + "/level_entire_thumbnail";
const ID_REG = /[0-9A-Z]{3}-[0-9A-Z]{3}-[0-9A-Z]{3}/gi;
let history = JSON.parse(localStorage.getItem("smm2_query_history")) || [];

const textSource = document.getElementById('textSource');
const makerInput = document.getElementById('makerInput');
const resultBox = document.getElementById('resultBox');
const apiInfoWrap = document.getElementById("apiInfoWrap");
const apiInfoBox = document.getElementById("apiInfoBox");
const userInfoWrap = document.getElementById("userInfoWrap");
const userInfoBox = document.getElementById("userInfoBox");
const historyBox = document.getElementById('historyBox');
const statusBox = document.getElementById('statusBox');

renderHistory();

async function pasteClipboard() {
    try {
        const clipText = await navigator.clipboard.readText();
        textSource.value = clipText;
        statusBox.className = "status-box status-green";
        statusBox.innerText = "✅ 已读取剪贴板内容";
    } catch (e) {
        statusBox.className = "status-box status-red";
        statusBox.innerText = "❌ 读取剪贴板失败，请手动粘贴";
    }
}

function clearTextarea() {
    textSource.value = "";
    resultBox.innerHTML = "<p class='empty-text'>暂无识别ID</p>";
    apiInfoWrap.classList.add("api-hidden");
    statusBox.className = "status-box";
    statusBox.innerText = "输入ID后点击查询或回车";
}

function clearUserInput() {
    makerInput.value = "";
    userInfoWrap.style.display = "none";
}

function scanAllText() {
    const raw = textSource.value;
    const ids = extractIds(raw);
    renderResult(ids);
    if (ids.length > 0) {
        statusBox.innerText = `🎉 识别到ID：${ids[0]}，自动查询`;
        statusBox.className = "status-box status-green flash-ok";
        fetchLevelInfo(ids[0]);
        saveHistory(ids[0]);
    } else {
        statusBox.innerText = "⚠️ 未找到有效ID，格式：XXX-XXX-XXX";
        statusBox.className = "status-box status-orange";
        apiInfoWrap.classList.add("api-hidden");
    }
}

function extractIds(text) {
    const rawMatch = text.match(ID_REG) || [];
    return [...new Set(rawMatch.map(s => s.toUpperCase()))];
}

function renderResult(ids) {
    if (!ids || ids.length === 0) {
        resultBox.innerHTML = "<p class='empty-text'>暂无识别ID</p>";
        return;
    }
    let html = "";
    ids.forEach(id => {
        html += `
        <div class="id-item">
            <span class="id-tag">${id}</span>
            <div class="btn-row" style="margin-top:0;">
                <button onclick="fetchLevelInfo('${id}')" class="btn-red" style="padding:4px 8px;font-size:12px;">查看详情</button>
                <button onclick="fillText('${id}')" class="btn-blue" style="padding:4px 8px;">填入输入框</button>
            </div>`;
    });
    resultBox.innerHTML = html;
}

function fillText(id) {
    textSource.value = id;
}

async function fetchLevelInfo(courseId) {
    try {
        const res = await fetch(`${LEVEL_INFO}/${courseId}`);
        if (!res.ok) throw new Error("err");
        const data = await res.json();
        apiInfoWrap.classList.remove("api-hidden");
        const fullImgUrl = `${THUMB_URL}/${courseId}`;
        apiInfoBox.innerHTML = `
        <p><span style="font-weight:bold;">关卡ID：</span>${courseId}</p>
        <p><span style="font-weight:bold;">关卡名称：</span>${data.name || "无名称"}</p>
        <p><span style="font-weight:bold;">玩家ID：</span>${data.maker_id || "无数据"}</p>
        <p><span style="font-weight:bold;">总游玩次数：</span>${data.courses_played || "暂无数据"}</p>
        <p><span style="font-weight:bold;">点赞 / 踩：</span>${data.likes || 0} / ${data.dislikes || 0}</p>
        <p><span style="font-weight:bold;">通关率：</span>${data.clear_rate ? data.clear_rate + "%" : "暂无数据"}</p>
        <p><span style="font-weight:bold;">对战数据：</span>总场次 ${data.battle_total || "暂无数据"}，胜利 ${data.battle_win || "暂无数据"}</p>
        <p><span style="font-weight:bold;">表世界全景大图：</span><a href="${fullImgUrl}" target="_blank" class="link-text">${fullImgUrl}</p>
        `;
    } catch (err) {
        apiInfoWrap.classList.remove("api-hidden");
        apiInfoBox.innerHTML = `<p style="color:#dc2626;">查询过快/api失效/网络错误</p>`;
    }
}

function renderCourseList(rawData, title) {
    const arr = Array.isArray(rawData) ? rawData : [];
    if (arr.length === 0) return `<p><b>${title}：</b>暂无数据</p>`;
    let html = `<p><b>${title}（共${arr.length}个）：</b></p>`;
    arr.forEach(item => {
        const cid = item.course_id ?? "未知ID";
        const cName = item.name ?? "无名称";
        const clike = item.likes ?? 0;
        const clearRate = item.clear_rate_pretty ?? "无";
        html += `<div class="list-item">ID：${cid} | 名称：${cName} | 点赞：${clike} | 通关率：${clearRate}</div>`;
    });
    return html;
}

async function searchUser() {
    let mid = makerInput.value.trim().toUpperCase();
    if (!mid) {
        statusBox.innerText = "⚠️ 请输入玩家ID";
        statusBox.className = "status-box status-orange";
        return;
    }
    statusBox.innerText = "⏳ 加载全部玩家数据";
    statusBox.className = "status-box status-orange";
    userInfoWrap.style.display = "block";
    let userData = null;
    let postedList = [];
    let likedList = [];
    let playedList = [];
    let firstClearList = [];
    let wrList = [];

    try {
        const r1 = await fetch(`${USER_INFO}/${mid}`);
        if (r1.ok) userData = await r1.json();
    } catch (e) {}
    try {
        const r2 = await fetch(`${GET_POSTED}/${mid}`);
        if (r2.ok) { const res = await r2.json(); postedList = res.courses || []; }
    } catch (e) {}
    try {
        const r3 = await fetch(`${GET_LIKED}/${mid}`);
        if (r3.ok) { const res = await r3.json(); likedList = res.courses || []; }
    } catch (e) {}
    try {
        const r4 = await fetch(`${GET_PLAYED}/${mid}`);
        if (r4.ok) { const res = await r4.json(); playedList = res.courses || []; }
    } catch (e) {}
    try {
        const r5 = await fetch(`${GET_FIRST_CLEARED}/${mid}`);
        if (r5.ok) { const res = await r5.json(); firstClearList = res.courses || []; }
    } catch (e) {}
    try {
        const r6 = await fetch(`${GET_WORLD_RECORD}/${mid}`);
        if (r6.ok) { const res = await r6.json(); wrList = res.courses || []; }
    } catch (e) {}

    let html = "";
    if (userData) {
        const miiImg = userData.mii_image ?? "无";
        const uploadTotal = userData.uploaded_levels ?? "暂无数据";
        const makerPoint = userData.maker_points ?? 0;
        const totalLike = userData.likes ?? "暂无数据";
        const totalBoos = userData.boos ?? "暂无数据";
        const totalPlay = userData.courses_played ?? "暂无数据";
        const totalClear = userData.courses_cleared ?? "暂无数据";
        const totalDeath = userData.courses_deaths ?? "暂无数据";
        const versusRank = userData.versus_rank_name ?? "无段位";
        const totalBattle = Number(userData.versus_plays) || 0;
        const battleWin = Number(userData.versus_won) || 0;
        const battleLose = Number(userData.versus_lost) || 0;
        const winRate = totalBattle === 0 ? "0.00%" : ((battleWin / totalBattle) * 100).toFixed(2) + "%";
        const avgClearRate = userData.total_clear_rate ? userData.total_clear_rate + "%" : "无统计";
        const wrCount = userData.world_records ?? 0;
        const firstClearCount = userData.first_clears ?? 0;
        html += `
        <p><span style="font-weight:bold;">玩家ID：</span>${mid}</p>
        <p><span style="font-weight:bold;">玩家名称：</span>${userData.name || "无名称"}</p>
        <p><span style="font-weight:bold;">Mii头像：</span><a href="${miiImg}" target="_blank" class="link-text">${miiImg}</a></p>
        <p><span style="font-weight:bold;">发布关卡总数：</span>${uploadTotal}</p>
        <p><span style="font-weight:bold;">创作者点数：</span>${makerPoint}</p>
        <p><span style="font-weight:bold;">总点赞：</span>${totalLike}</p>
        <p><span style="font-weight:bold;">总踩：</span>${totalBoos}</p>
        <p><span style="font-weight:bold;">总游玩次数：</span>${totalPlay}</p>
        <p><span style="font-weight:bold;">总通关人数：</span>${totalClear}</p>
        <p><span style="font-weight:bold;">总死亡次数：</span>${totalDeath}</p>
        <p><span style="font-weight:bold;">对战段位：</span>${versusRank}</p>
        <p><span style="font-weight:bold;">总对战场次：</span>${totalBattle}</p>
        <p><span style="font-weight:bold;">对战胜利场次：</span>${battleWin}</p>
        <p><span style="font-weight:bold;">对战失败场次：</span>${battleLose}</p>
        <p><span style="font-weight:bold;">对战胜率：</span>${winRate}</p>
        <p><span style="font-weight:bold;">全局平均通关率：</span>${avgClearRate}</p>
        <p><span style="font-weight:bold;">拥有世界纪录：</span>${wrCount}个</p>
        <p><span style="font-weight:bold;">首通记录总数：</span>${firstClearCount}个</p>
        <hr>
        `;
    } else {
        html += `<p style="color:#c00;">玩家基础信息加载失败</p><hr>`;
    }
    html += renderCourseList(postedList, "发布的关卡");
    html += "<hr>";
    html += renderCourseList(likedList, "点赞过的关卡");
    html += "<hr>";
    html += renderCourseList(playedList, "游玩过的关卡");
    html += "<hr>";
    html += renderCourseList(firstClearList, "首通关卡");
    html += "<hr>";
    html += renderCourseList(wrList, "持有世界纪录关卡");

    userInfoBox.innerHTML = html;
    statusBox.innerText = "✅ 全部玩家数据加载完成";
    statusBox.className = "status-box status-green flash-ok";
}

function saveHistory(id) {
    if (!history.includes(id)) {
        history.unshift(id);
        if (history.length > 15) history.pop();
        localStorage.setItem("smm2_query_history", JSON.stringify(history));
        renderHistory();
    }
}
function renderHistory() {
    if (history.length === 0) {
        historyBox.innerHTML = "<p class='empty-text'>暂无记录</p>";
        return;
    }
    let html = "";
    history.forEach(id => {
        html += `
        <div class="history-item">
            <span class="his-text" onclick="fillText('${id}')">${id}</span>
            <div class="btn-row" style="margin-top:0;">
                <button onclick="fetchLevelInfo('${id}')" style="font-size:12px;color:#3b82f6;background:transparent;border:none;cursor:pointer;">查询</button>
                <button onclick="delSingleHistory('${id}')" style="font-size:12px;color:#dc2626;background:transparent;border:none;cursor:pointer;">删除</button>
            </div>`;
    });
    historyBox.innerHTML = html;
}
function delSingleHistory(id) {
    history = history.filter(i => i !== id);
    localStorage.setItem("smm2_query_history");
    renderHistory();
}
function clearAllHistory() {
    history = [];
    localStorage.removeItem("smm2_query_history");
    renderHistory();
}

textSource.addEventListener("keydown", e=>{
    if(e.key === "Enter") scanAllText();
})
makerInput.addEventListener("keydown", e=>{
    if(e.key === "Enter") searchUser();
})
</script>
</body>
</html>
